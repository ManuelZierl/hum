apply plugin: 'com.android.library'

android {
  compileSdkVersion 33
  defaultConfig {
    minSdkVersion 23
    targetSdkVersion 33
  }
  sourceSets {
    main {
      java.srcDirs = ['src/main/java']
      manifest.srcFile 'src/main/AndroidManifest.xml'
    }
  }
}

dependencies {
  implementation 'com.facebook.react:react-native:+'
}
