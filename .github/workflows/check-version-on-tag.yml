name: Check version on tag

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Sync version from tag and validate
        run: npm run sync:version

      - name: Generate build info
        run: npm run build-info

      - name: Typecheck / Lint / Test / Storybook build
        run: |
          npm run typecheck
          npm run lint
          npm test
          npm run storybook:build
