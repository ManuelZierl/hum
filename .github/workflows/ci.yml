name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      node: ${{ steps.filter.outputs.node }}
      rust: ${{ steps.filter.outputs.rust }}
      storybook: ${{ steps.filter.outputs.storybook }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            node:
              - 'apps/**'
              - 'packages/**'
              - 'scripts/**'
              - 'tests/**'
              - 'docs/**'
              - 'assets/**'
              - 'package.json'
              - 'package-lock.json'
              - '.nvmrc'
              - '.prettierrc.json'
              - '.prettierignore'
              - 'eslint.config.mjs'
              - 'jest.config.js'
              - 'tsconfig*.json'
              - 'metro.config.js'
            rust:
              - 'native/rust/**'
            storybook:
              - 'e2e/**'
              - 'apps/**'
              - 'packages/**'
              - 'docs/**'
              - 'assets/**'
              - 'package.json'
              - 'package-lock.json'
              - '.nvmrc'
              - 'playwright.config.ts'
              - 'tsconfig*.json'
            ci:
              - '.github/workflows/**'
            detox:
              - 'apps/mobile/**'
              - 'packages/hum-matrix-native/**'
              - 'native/rust/**'

  node:
    needs: changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || needs.changes.outputs.node == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Format
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build packages
        run: npm run -ws --if-present build

  rust:
    needs: changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    defaults:
      run:
        working-directory: native/rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            native/rust -> native/rust/target

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test

      #- name: Test with sqlite
      #  run: cargo test --features sqlite

  storybook-e2e:
    needs: changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || needs.changes.outputs.storybook == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build Storybook
        run: npm run storybook:build

      - name: Run Storybook smoke tests
        run: SB_STATIC=1 npm run test:sb:e2e

  detox-android:
    needs: changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || needs.changes.outputs.detox == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prebuild mobile app (Android)
        run: |
          cd apps/mobile
          DEV_FEATURES=1 npx expo prebuild --non-interactive --platform android

      - name: Run Detox on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-snapshot -noaudio -no-boot-anim
          script: |
            DEV_FEATURES=1 npm run detox:build:android
            npm run detox:test:android
