name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      node: ${{ steps.filter.outputs.node }}
      rust: ${{ steps.filter.outputs.rust }}
      storybook: ${{ steps.filter.outputs.storybook }}
      ci: ${{ steps.filter.outputs.ci }}
      markdown: ${{ steps.filter.outputs.markdown }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            node:
              - 'apps/**'
              - 'packages/**'
              - 'scripts/**'
              - 'tests/**'
              - 'docs/**'
              - 'assets/**'
              - 'package.json'
              - 'package-lock.json'
              - '.nvmrc'
              - '.prettierrc.json'
              - '.prettierignore'
              - 'eslint.config.mjs'
              - 'jest.config.js'
              - 'tsconfig*.json'
              - 'metro.config.js'
            rust:
              - 'native/rust/**'
            storybook:
              - 'e2e/**'
              - 'apps/**'
              - 'packages/**'
              - 'docs/**'
              - 'assets/**'
              - 'package.json'
              - 'package-lock.json'
              - '.nvmrc'
              - 'playwright.config.ts'
              - 'tsconfig*.json'
            ci:
              - '.github/workflows/**'
            markdown:
              - '**/*.md'

  node_lint:
    needs: changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || needs.changes.outputs.node == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format
        run: npm run format:check

  node_typecheck:
    needs: changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || needs.changes.outputs.node == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  node_tests:
    needs: changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || needs.changes.outputs.node == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Upload Node coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: node
          fail_ci_if_error: true
          verbose: true
          codecov_yml_path: ./codecov.yml
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build packages
        run: npm run -ws --if-present build

  node_npm_audit:
    needs: changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || needs.changes.outputs.node == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit (prod-only, high+)
        run: npm audit --production --audit-level=high

  node_npm_check:
    needs: changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || needs.changes.outputs.node == 'true' || needs.changes.outputs.ci == 'true'
    env:
      NODE_OPTIONS: --require global-agent/bootstrap
      GLOBAL_AGENT_HTTP_PROXY: ${{ env.HTTPS_PROXY || '' }}
      NPM_CONFIG_LOGLEVEL: silent
      CI: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm-check (root & workspaces)
        run: |
          mkdir -p artifacts
          node <<'NODE'
          const fs = require('fs');
          const {execSync} = require('child_process');
          const env = {
            ...process.env,
            NODE_OPTIONS: process.env.NODE_OPTIONS || '',
            GLOBAL_AGENT_HTTP_PROXY: process.env.GLOBAL_AGENT_HTTP_PROXY || '',
            npm_config_loglevel: process.env.NPM_CONFIG_LOGLEVEL || 'silent',
            CI: '1',
          };
          function runCheck(cwd, name, file) {
            const result = execSync('npx npm-check --skip-unused --no-color', {
              cwd,
              env,
              stdio: ['ignore', 'pipe', 'inherit'],
            });
            fs.writeFileSync(file, result.toString());
            process.stdout.write(result.toString());
          }
          runCheck(process.cwd(), 'root', 'artifacts/npm-check-root.txt');
          const workspaces = JSON.parse(execSync('npm query .workspace --json', {
            cwd: process.cwd(),
            env,
            stdio: ['ignore', 'pipe', 'inherit'],
          }));
          for (const workspace of workspaces) {
            const safeName = workspace.name.replace(/[^a-zA-Z0-9_-]/g, '_');
            runCheck(workspace.path, workspace.name, `artifacts/npm-check-${safeName}.txt`);
          }
          NODE

      - uses: actions/upload-artifact@v4
        with:
          name: npm-check-reports
          path: artifacts/

  markdown:
    needs: changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || needs.changes.outputs.markdown == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint Markdown
        run: npm run lint:md
  rust:
    needs: changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    defaults:
      run:
        working-directory: native/rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            native/rust -> native/rust/target

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy (stable, all features)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Install nightly + llvm-tools
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - name: Install coverage tools
        run: |
          cargo install cargo-llvm-cov --locked
          cargo install cargo-nextest --locked
          # isolate instrumented artifacts from normal cached target
          echo "CARGO_LLVM_COV_TARGET_DIR=${{ runner.temp }}/cov-target" >> $GITHUB_ENV

      - name: Show tool versions
        run: |
          cargo +nightly llvm-cov --version
          cargo +nightly nextest --version

      - name: Generate LCOV report
        env:
          RUSTFLAGS: --cfg coverage_nightly
        run: |
          mkdir -p coverage
          cargo +nightly llvm-cov clean --workspace
          cargo +nightly llvm-cov nextest --workspace --no-clean \
            --lcov --output-path coverage/lcov.info

      - name: Generate HTML report (optional)
        env:
          RUSTFLAGS: --cfg coverage_nightly
        run: |
          cargo +nightly llvm-cov nextest --workspace --no-clean \
            --html --output-dir coverage/html

      - name: Sanity check coverage outputs
        run: |
          ls -la coverage
          test -s coverage/lcov.info

      - name: Upload HTML report (optional)
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage-html
          path: native/rust/coverage/html

      - name: Upload Rust coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./native/rust/coverage/lcov.info
          flags: rust
          fail_ci_if_error: true
          verbose: true
          codecov_yml_path: ./codecov.yml
          token: ${{ secrets.CODECOV_TOKEN }}

  storybook-e2e:
    needs: changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || needs.changes.outputs.storybook == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Determine Playwright version
        id: pwver
        shell: bash
        run: |
          PW_VERSION=$(node -e "process.stdout.write(require('@playwright/test/package.json').version)")
          echo "version=$PW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore Playwright browsers cache
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.pw-browsers
          key: ${{ runner.os }}-pw-v${{ steps.pwver.outputs.version }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pw-v${{ steps.pwver.outputs.version }}-
            ${{ runner.os }}-pw-

      - name: Inspect Playwright cache
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.pw-browsers
        run: |
          echo "cache-hit=${{ steps.pw-cache.outputs['cache-hit'] }}"
          echo "PLAYWRIGHT_BROWSERS_PATH=${PLAYWRIGHT_BROWSERS_PATH}"
          ls -la "${PLAYWRIGHT_BROWSERS_PATH}" || true
          ls -la ~/.cache/ms-playwright || true
          sudo ls -la /root/.cache/ms-playwright || true

      - name: Install Playwright browsers (no OS deps)
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.pw-browsers
          DEBUG: pw:install
        run: npx playwright install chromium

      - name: Build Storybook
        run: npm run storybook:build

      - name: Run Storybook smoke tests
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.pw-browsers
        run: SB_STATIC=1 npm run test:sb:e2e
