name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      node: ${{ steps.filter.outputs.node }}
      rust: ${{ steps.filter.outputs.rust }}
      storybook: ${{ steps.filter.outputs.storybook }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            node:
              - 'apps/**'
              - 'packages/**'
              - 'scripts/**'
              - 'tests/**'
              - 'docs/**'
              - 'assets/**'
              - 'package.json'
              - 'package-lock.json'
              - '.nvmrc'
              - '.prettierrc.json'
              - '.prettierignore'
              - 'eslint.config.mjs'
              - 'jest.config.js'
              - 'tsconfig*.json'
              - 'metro.config.js'
            rust:
              - 'native/rust/**'
            storybook:
              - 'e2e/**'
              - 'apps/**'
              - 'packages/**'
              - 'docs/**'
              - 'assets/**'
              - 'package.json'
              - 'package-lock.json'
              - '.nvmrc'
              - 'playwright.config.ts'
              - 'tsconfig*.json'
            ci:
              - '.github/workflows/**'
            detox:
              - 'apps/mobile/**'
              - 'packages/hum-matrix-native/**'
              - 'native/rust/**'

  node:
    needs: changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || needs.changes.outputs.node == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Format
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build packages
        run: npm run -ws --if-present build

  rust:
    needs: changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    defaults:
      run:
        working-directory: native/rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            native/rust -> native/rust/target

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test

      #- name: Test with sqlite
      #  run: cargo test --features sqlite

  storybook-e2e:
    needs: changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || needs.changes.outputs.storybook == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Determine Playwright version
        id: pwver
        run: echo "version=$(node -p \"require('@playwright/test/package.json').version\")" >> $GITHUB_OUTPUT

      - name: Restore Playwright browsers cache
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.pw-browsers
          key: ${{ runner.os }}-pw-v${{ steps.pwver.outputs.version }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pw-v${{ steps.pwver.outputs.version }}-
            ${{ runner.os }}-pw-

      - name: Inspect Playwright cache
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.pw-browsers
        run: |
          echo "cache-hit=${{ steps.pw-cache.outputs['cache-hit'] }}"
          echo "PLAYWRIGHT_BROWSERS_PATH=${PLAYWRIGHT_BROWSERS_PATH}"
          ls -la "${PLAYWRIGHT_BROWSERS_PATH}" || true
          ls -la ~/.cache/ms-playwright || true
          sudo ls -la /root/.cache/ms-playwright || true

      - name: Install Playwright browsers (no OS deps)
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.pw-browsers
          DEBUG: pw:install
        run: npx playwright install chromium

      - name: Build Storybook
        run: npm run storybook:build

      - name: Run Storybook smoke tests
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.pw-browsers
        run: SB_STATIC=1 npm run test:sb:e2e

  detox-android:
    needs: changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || needs.changes.outputs.detox == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/mobile/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install emulator runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpulse0 \
            libvulkan1 \
            libx11-6 \
            libxext6 \
            libxrender1 \
            libxrandr2 \
            libxfixes3 \
            libxcursor1 \
            libxi6 \
            libxkbcommon0 \
            libnss3 \
            libglu1-mesa

      - name: Ensure ADB server
        run: |
          echo "Starting ADB server"
          /usr/local/lib/android/sdk/platform-tools/adb start-server || true

      - name: Prebuild mobile app (Android)
        run: |
          cd apps/mobile
          DEV_FEATURES=1 npx expo prebuild --non-interactive --platform android

      - name: Cache Android NDK
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/ndk/27.1.12297006
          key: ${{ runner.os }}-ndk-27.1.12297006

      - name: Cache AVD
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/avd
            ~/.android/adb
          key: ${{ runner.os }}-avd-api34-default-x86_64-pixel_6

      - name: Detox build (Android)
        env:
          CI: true
          NODE_ENV: production
        run: DEV_FEATURES=1 npx detox build -c android.emu.debug

      - name: Run Detox on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu off -no-snapshot -noaudio -no-boot-anim -accel off
          script: |
            CI=true NODE_ENV=production DEV_FEATURES=1 npx detox test -c android.emu.debug --headless -w 1
          emulator-boot-timeout: 900
