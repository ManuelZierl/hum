name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      node: ${{ steps.filter.outputs.node }}
      rust: ${{ steps.filter.outputs.rust }}
      storybook: ${{ steps.filter.outputs.storybook }}
      ci: ${{ steps.filter.outputs.ci }}
      android: ${{ steps.filter.outputs.android }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            node:
              - 'apps/**'
              - 'packages/**'
              - 'scripts/**'
              - 'tests/**'
              - 'docs/**'
              - 'assets/**'
              - 'package.json'
              - 'package-lock.json'
              - '.nvmrc'
              - '.prettierrc.json'
              - '.prettierignore'
              - 'eslint.config.mjs'
              - 'jest.config.js'
              - 'tsconfig*.json'
              - 'metro.config.js'
            rust:
              - 'native/rust/**'
            storybook:
              - 'e2e/**'
              - 'apps/**'
              - 'packages/**'
              - 'docs/**'
              - 'assets/**'
              - 'package.json'
              - 'package-lock.json'
              - '.nvmrc'
              - 'playwright.config.ts'
              - 'tsconfig*.json'
            ci:
              - '.github/workflows/**'
            android:
              - 'apps/mobile/**'
              - 'packages/hum-matrix-native/**'
              - 'native/rust/**'

  node:
    needs: changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || needs.changes.outputs.node == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Format
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build packages
        run: npm run -ws --if-present build

  rust:
    needs: changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    defaults:
      run:
        working-directory: native/rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            native/rust -> native/rust/target

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test

      #- name: Test with sqlite
      #  run: cargo test --features sqlite

  storybook-e2e:
    needs: changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || needs.changes.outputs.storybook == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Determine Playwright version
        id: pwver
        shell: bash
        run: |
          PW_VERSION=$(node -e "process.stdout.write(require('@playwright/test/package.json').version)")
          echo "version=$PW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore Playwright browsers cache
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.pw-browsers
          key: ${{ runner.os }}-pw-v${{ steps.pwver.outputs.version }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pw-v${{ steps.pwver.outputs.version }}-
            ${{ runner.os }}-pw-

      - name: Inspect Playwright cache
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.pw-browsers
        run: |
          echo "cache-hit=${{ steps.pw-cache.outputs['cache-hit'] }}"
          echo "PLAYWRIGHT_BROWSERS_PATH=${PLAYWRIGHT_BROWSERS_PATH}"
          ls -la "${PLAYWRIGHT_BROWSERS_PATH}" || true
          ls -la ~/.cache/ms-playwright || true
          sudo ls -la /root/.cache/ms-playwright || true

      - name: Install Playwright browsers (no OS deps)
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.pw-browsers
          DEBUG: pw:install
        run: npx playwright install chromium

      - name: Build Storybook
        run: npm run storybook:build

      - name: Run Storybook smoke tests
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.pw-browsers
        run: SB_STATIC=1 npm run test:sb:e2e

  android-instrumentation:
    needs: changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || needs.changes.outputs.android == 'true' || needs.changes.outputs.ci == 'true'
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      # Make Gradle/chatty but deterministic
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dkotlin.daemon.useFallbackStrategy=true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Node deps
        run: npm ci

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/mobile/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Ensure Android SDK packages
        run: |
          set -eux
          "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --version
          set +o pipefail
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          set -o pipefail
          "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "emulator" \
            "build-tools;36.0.0" \
            "platforms;android-35" \
            "system-images;android-33;default;x86_64"
          "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --list_installed || true

      # Emulator OS libs (prevents libpulse/libX* crashes)
      - name: Install emulator OS dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libpulse0 \
            libvulkan1 \
            libx11-6 \
            libxext6 \
            libxrender1 \
            libxrandr2 \
            libxfixes3 \
            libxcursor1 \
            libxi6 \
            libxkbcommon0 \
            libnss3 \
            libglu1-mesa

      # Helpful context if prebuild fails
      - name: Print repo tree (top)
        run: |
          set -euxo pipefail
          pwd
          ls -la
          echo "::group::tree depth 2"
          sudo apt-get install -y tree >/dev/null 2>&1 || true
          tree -L 2 -I node_modules || true
          echo "::endgroup::"

      - name: Prebuild mobile app (Android)
        run: |
          set -euxo pipefail
          cd apps/mobile
          echo "Node: $(node -v)  NPM: $(npm -v)"
          echo "Java:"
          java -version
          echo "::group::expo prebuild"
          DEV_FEATURES=1 npx --yes expo prebuild --non-interactive --platform android || { echo "::error ::expo prebuild failed"; exit 1; }
          echo "::endgroup::"

      # HARD FAIL if gradle wrapper or android dir is missing
      - name: Verify Android project + wrapper
        run: |
          set -euxo pipefail
          echo "Listing apps/mobile/android:"
          ls -la apps/mobile/android || true
          test -f apps/mobile/android/gradlew || (echo "::error ::gradlew not found at apps/mobile/android/gradlew (prebuild likely failed)"; exit 1)
          test -f apps/mobile/android/app/src/main/AndroidManifest.xml || (echo "::warning ::AndroidManifest.xml not found where expected")

      # Extra diagnostics before emulator
      - name: Android tools diagnostics
        run: |
          set -euxo pipefail
          echo "adb version:"
          "${ANDROID_HOME}/platform-tools/adb" version || true
          echo "emulator version:"
          "${ANDROID_HOME}/emulator/emulator" -version || true
          echo "avdmanager devices (profiles):"
          "${ANDROID_HOME}/cmdline-tools/latest/bin/avdmanager" list device | head -n 80 || true
          echo "ENV SNAPSHOT:"
          env | sort | sed 's/\(PASS\|TOKEN\|KEY\|SECRET\)=.*/\1=***REDACTED***/' || true

      # Boots emulator and runs the tests. All test-related commands live inside 'script'
      - name: Run instrumentation on emulator (API 33 default)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          target: default                # <- faster than google_apis
          profile: pixel
          ram-size: 4096M
          disk-size: 8G
          disable-animations: true
          disable-linux-hw-accel: true   # GH runners don't expose KVM
          emulator-boot-timeout: 600000  # 10 min cap; we bail earlier in script if needed
          emulator-options: >-
            -no-window -no-audio -no-snapshot -no-snapshot-save -no-boot-anim
            -wipe-data -gpu swiftshader_indirect -netfast -verbose
          pre-emulator-launch-script: |
            set -eux
            "${ANDROID_HOME}/platform-tools/adb" kill-server || true
            "${ANDROID_HOME}/platform-tools/adb" start-server || true
            "${ANDROID_HOME}/emulator/emulator" -version || true
          script: |
            set -euxo pipefail
            echo "Waiting for device..."
            "${ANDROID_HOME}/platform-tools/adb" wait-for-device
            "${ANDROID_HOME}/platform-tools/adb" devices

            # Start logcat capture early (background) so we have boot logs even if the run fails.
            mkdir -p .debug/android
            "${ANDROID_HOME}/platform-tools/adb" logcat -v time > .debug/android/logcat_boot.txt 2>&1 &
            LOGCAT_PID=$!

            # Fail-fast boot wait (max ~8 min)
            i=0
            until [ "$("${ANDROID_HOME}/platform-tools/adb" shell getprop sys.boot_completed | tr -d '\r')" = "1" ]; do
              i=$((i+1))
              if [ $i -gt 480 ]; then
                echo "::error ::Emulator failed to boot within 8 minutes (API 33 default)."
                "${ANDROID_HOME}/platform-tools/adb" devices || true
                "${ANDROID_HOME}/platform-tools/adb" shell getprop init.svc.bootanim || true
                # Stop background logcat before exiting
                kill $LOGCAT_PID || true
                exit 1
              fi
              "${ANDROID_HOME}/platform-tools/adb" shell getprop init.svc.bootanim || true
              sleep 1
            done

            echo "Emulator booted."
            "${ANDROID_HOME}/platform-tools/adb" shell getprop ro.build.version.sdk || true

            # Run tests (call wrapper via bash to ignore exec-bit issues)
            bash apps/mobile/android/gradlew --no-daemon --stacktrace --info \
              assembleDebug assembleAndroidTest connectedDebugAndroidTest

            # Stop background logcat after tests
            kill $LOGCAT_PID || true

            echo "::group::Test result files"
            ls -R apps/mobile/android/app/build/outputs/androidTest-results || true
            ls -R apps/mobile/android/app/build/reports || true
            echo "::endgroup::"

      # If anything failed/hung, collect as much as we can
      - name: (Always) Collect Android diagnostics
        if: always()
        run: |
          set +e
          mkdir -p .debug/android

          # Ensure adb server, detect the emulator (if any)
          "${ANDROID_HOME}/platform-tools/adb" start-server || true
          "${ANDROID_HOME}/platform-tools/adb" devices > .debug/android/adb_devices.txt 2>&1 || true
          DEVICE="$("${ANDROID_HOME}/platform-tools/adb" devices | awk '/emulator-/{print $1; exit}')" || true

          # Always preserve boot log (if created in the emulator step)
          if [ -f .debug/android/logcat_boot.txt ]; then
            echo "boot log present" >> .debug/android/logs_index.txt
          else
            echo "no boot log" >> .debug/android/logs_index.txt
          fi

          # Only try to pull live logs if we still have a device online
          if [ -n "$DEVICE" ]; then
            timeout 20s "${ANDROID_HOME}/platform-tools/adb" -s "$DEVICE" logcat -d > .debug/android/logcat.txt 2>&1 || true
            timeout 120s "${ANDROID_HOME}/platform-tools/adb" -s "$DEVICE" bugreport .debug/android/bugreport.zip || true
          else
            echo "No emulator device online; skipping live logcat/bugreport" > .debug/android/no_device.txt
          fi

          # AVD + SDK context
          ls -la ~/.android > .debug/android/home_android_ls.txt 2>&1 || true
          ls -la ~/.android/avd > .debug/android/avd_ls.txt 2>&1 || true
          grep -R . ~/.android/avd/*.avd/config.ini > .debug/android/avd_configs.txt 2>&1 || true
          "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --list > .debug/android/sdk_list.txt 2>&1 || true
          "${ANDROID_HOME}/emulator/emulator" -version > .debug/android/emulator_version.txt 2>&1 || true
          java -version > .debug/android/java_version.txt 2>&1 || true

      - name: Upload test & debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-instrumentation-artifacts
          path: |
            apps/mobile/android/app/build/reports/**
            apps/mobile/android/app/build/outputs/androidTest-results/**
            .debug/android/**
