name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      node: ${{ steps.filter.outputs.node }}
      rust: ${{ steps.filter.outputs.rust }}
      storybook: ${{ steps.filter.outputs.storybook }}
      ci: ${{ steps.filter.outputs.ci }}
      android: ${{ steps.filter.outputs.android }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            node:
              - 'apps/**'
              - 'packages/**'
              - 'scripts/**'
              - 'tests/**'
              - 'docs/**'
              - 'assets/**'
              - 'package.json'
              - 'package-lock.json'
              - '.nvmrc'
              - '.prettierrc.json'
              - '.prettierignore'
              - 'eslint.config.mjs'
              - 'jest.config.js'
              - 'tsconfig*.json'
              - 'metro.config.js'
            rust:
              - 'native/rust/**'
            storybook:
              - 'e2e/**'
              - 'apps/**'
              - 'packages/**'
              - 'docs/**'
              - 'assets/**'
              - 'package.json'
              - 'package-lock.json'
              - '.nvmrc'
              - 'playwright.config.ts'
              - 'tsconfig*.json'
            ci:
              - '.github/workflows/**'
            android:
              - 'apps/mobile/**'
              - 'packages/hum-matrix-native/**'
              - 'native/rust/**'

  node:
    needs: changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || needs.changes.outputs.node == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Format
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build packages
        run: npm run -ws --if-present build

  rust:
    needs: changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    defaults:
      run:
        working-directory: native/rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            native/rust -> native/rust/target

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test

      #- name: Test with sqlite
      #  run: cargo test --features sqlite

  storybook-e2e:
    needs: changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || needs.changes.outputs.storybook == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Determine Playwright version
        id: pwver
        shell: bash
        run: |
          PW_VERSION=$(node -e "process.stdout.write(require('@playwright/test/package.json').version)")
          echo "version=$PW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore Playwright browsers cache
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.pw-browsers
          key: ${{ runner.os }}-pw-v${{ steps.pwver.outputs.version }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pw-v${{ steps.pwver.outputs.version }}-
            ${{ runner.os }}-pw-

      - name: Inspect Playwright cache
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.pw-browsers
        run: |
          echo "cache-hit=${{ steps.pw-cache.outputs['cache-hit'] }}"
          echo "PLAYWRIGHT_BROWSERS_PATH=${PLAYWRIGHT_BROWSERS_PATH}"
          ls -la "${PLAYWRIGHT_BROWSERS_PATH}" || true
          ls -la ~/.cache/ms-playwright || true
          sudo ls -la /root/.cache/ms-playwright || true

      - name: Install Playwright browsers (no OS deps)
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.pw-browsers
          DEBUG: pw:install
        run: npx playwright install chromium

      - name: Build Storybook
        run: npm run storybook:build

      - name: Run Storybook smoke tests
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.pw-browsers
        run: SB_STATIC=1 npm run test:sb:e2e

  android-instrumentation:
    needs: changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || needs.changes.outputs.android == 'true' || needs.changes.outputs.ci == 'true'
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/mobile/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Ensure Java 17 explicitly (AGP expects it; ubuntu-latest usually has it, but be explicit)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Install SDK bits + accept licenses BEFORE prebuild/build
      - name: Ensure Android SDK packages
        run: |
          "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --version
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --licenses
          "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "emulator" \
            "build-tools;36.0.0" \
            "platforms;android-35" \
            "platforms;android-34" \
            "system-images;android-34;google_apis;x86_64"

      - name: Prebuild mobile app (Android)
        run: |
          cd apps/mobile
          DEV_FEATURES=1 npx expo prebuild --non-interactive --platform android

      - name: Ensure ADB server
        run: |
          "${ANDROID_HOME}/platform-tools/adb" start-server || true

      - name: Create AVD
        run: |
          # Use a widely available device profile; pixel_6 is usually present, but "pixel" is safest.
          echo "no" | "${ANDROID_HOME}/cmdline-tools/latest/bin/avdmanager" create avd \
            -n test \
            -k "system-images;android-34;google_apis;x86_64" \
            -d pixel

      - name: Start emulator
        run: |
          "${ANDROID_HOME}/emulator/emulator" -avd test \
            -no-window -no-audio -no-snapshot -no-snapshot-save -no-boot-anim \
            -gpu swiftshader_indirect -memory 4096 -netfast -accel auto &
          "${ANDROID_HOME}/platform-tools/adb" wait-for-device
          # Wait until fully booted
          "${ANDROID_HOME}/platform-tools/adb" shell 'until [[ "$(getprop sys.boot_completed)" == "1" && "$(getprop dev.bootcomplete)" == "1" ]]; do sleep 1; done'
          # Speed up UI
          "${ANDROID_HOME}/platform-tools/adb" shell settings put global animator_duration_scale 0
          "${ANDROID_HOME}/platform-tools/adb" shell settings put global window_animation_scale 0
          "${ANDROID_HOME}/platform-tools/adb" shell settings put global transition_animation_scale 0
          # Sanity check
          "${ANDROID_HOME}/platform-tools/adb" shell getprop ro.build.version.sdk
          "${ANDROID_HOME}/platform-tools/adb" shell wm size

      - name: Run instrumentation tests
        working-directory: apps/mobile/android
        run: ./gradlew --no-daemon assembleDebug assembleAndroidTest connectedDebugAndroidTest

      - name: (Always) Dump logs on failure/success
        if: always()
        run: |
          "${ANDROID_HOME}/platform-tools/adb" -s emulator-5554 logcat -d > adb-logcat.txt || true
          "${ANDROID_HOME}/platform-tools/adb" -s emulator-5554 bugreport bugreport.zip || true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-instrumentation-artifacts
          path: |
            apps/mobile/android/app/build/reports/**
            apps/mobile/android/app/build/outputs/androidTest-results/**
            adb-logcat.txt
            bugreport.zip

